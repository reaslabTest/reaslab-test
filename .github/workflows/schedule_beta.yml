# 全量 scope：**`common/run-scope-beta.txt`**。**`E2E_BASE_URL`** 在本文件 **`env`** 写死（换站请改字面量）。
# 每 6 小时执行（UTC）：`pnpm run reaslab-test -- --exit-zero-on-e2e-failure` → **run.mjs** + **`common/run-scope-beta.txt`** → Vercel 报告 → 飞书（**`E2E_BASE_URL`** 见本 job **`env`** / **`common/global-setup.ts`**）。
# GitHub Actions 的 `schedule.cron` 一律按 UTC；`0 */6 * * *` = 每 6 小时整点一次（0、6、12、18 时 UTC 的 :00；东八区约 8:00、14:00、20:00、次日 2:00）。
# 若单次 job 偶发超过定时间隔且 `cancel-in-progress: true`，下一触发可能取消上一跑；可改为 `false` 或再调稀 cron。
#
# `package.json` 的 postinstall 会执行 `playwright install chromium`（体积大、易拖长 Install）。
# Playwright：若 runner 本机已有 `~/.cache/ms-playwright/chromium-*`，则 **跳过** `actions/cache` 的 restore，
# 避免从 GitHub 拉回 ~700MB+；本机无则再走 Actions cache（命中则 restore，未命中则 postinstall 从 CDN 下）。
# pnpm：**不**启用 `setup-node` 的 `cache: pnpm`（GitHub Actions 缓存 tarball，经代理常 0 B/s 卡住）。
# GitHub 托管 runner：每 job 干净环境，Playwright 浏览器依赖本 workflow 的 `actions/cache` 或 postinstall 下载。
# （若改回 self-hosted：同一用户下 `pnpm store` 常持久存在，`pnpm install` 更易复用本地 store。）
name: "beta: E2E + Vercel + Feishu (6h UTC)"

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: report-beta
  cancel-in-progress: true

jobs:
  report:
    # E2E：`E2E_BASE_URL` 见 common/global-setup.ts（须为 runner 可访问的 URL；托管机用公网 beta 等）。
    # 原 self-hosted（本机起被测、与 config.sh 标签一致时启用）：
    # runs-on: [self-hosted, Linux, X64]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Detect local Playwright browser cache
        id: pw_local
        shell: bash
        run: |
          MS="${HOME}/.cache/ms-playwright"
          if [[ -d "$MS" ]] && compgen -G "${MS}/chromium-*" > /dev/null; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
            echo "Local ~/.cache/ms-playwright has chromium-*; skip Actions cache restore."
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "No local chromium cache; will restore from Actions cache if available."
          fi

      - name: Restore Playwright browsers (Actions cache)
        if: steps.pw_local.outputs.present != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          CI: "true"

      - name: Run scoped E2E (common/run-scope-beta.txt), deploy Vercel, notify Feishu
        # 需 `VERCEL_TOKEN`；被测 origin 由下方 **`E2E_BASE_URL`** 注入（与 **`global-setup.ts`** 读取一致；换站改本 yml 字面量）。
        # **`reaslab-test` + `--exit-zero-on-e2e-failure`**：读取 **`common/run-scope-beta.txt`** 决定跑哪些 `test/NN-*.test.ts`；E2E 失败时 job 仍可能绿（失败见报告与飞书）。
        run: pnpm run reaslab-test -- --exit-zero-on-e2e-failure
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          E2E_BASE_URL: https://beta.reaslab.io
