# 子集 scope（**`common/run-scope-test.txt`**）；被测 **`E2E_BASE_URL`** 在本文件 **`env`** 中写死（与 **`schedule_beta.yml`** 一致时可均为 beta，仅用例范围不同）。
# 与 **`schedule_beta.yml`** 使用不同 **`concurrency.group`**，避免并行时互相 **cancel-in-progress**。
# 若需测其它 origin：直接改下方 **`E2E_BASE_URL`** 字面量；Cloudflare 头与 **`global-setup.ts`** 默认不一致时再增加 **`E2E_CF_TESTING_AUTH`** 行。
# `schedule` 仅默认分支生效；与 A 同 cron 时可并行两 job。
name: Report Site B (partial scope + Vercel + Feishu)

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

concurrency:
  group: report-site-b
  cancel-in-progress: true

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Detect local Playwright browser cache
        id: pw_local
        shell: bash
        run: |
          MS="${HOME}/.cache/ms-playwright"
          if [[ -d "$MS" ]] && compgen -G "${MS}/chromium-*" > /dev/null; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
            echo "Local ~/.cache/ms-playwright has chromium-*; skip Actions cache restore."
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "No local chromium cache; will restore from Actions cache if available."
          fi

      - name: Restore Playwright browsers (Actions cache)
        if: steps.pw_local.outputs.present != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          CI: "true"

      - name: Run partial E2E (run-scope-test.txt), deploy Vercel, notify Feishu
        run: pnpm exec node run.mjs --scope-file=common/run-scope-test.txt --exit-zero-on-e2e-failure
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          E2E_BASE_URL: https://model.reaslab.io
